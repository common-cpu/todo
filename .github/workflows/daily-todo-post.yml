name: Daily Asana ToDo Post to Google Chat

on:
  schedule:
    # 平日 JST 9:00 (UTC 0:00) に実行
    - cron: "0 0 * * 1-5"
  workflow_dispatch: # 手動実行も可能

jobs:
  post-todos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run ToDo poster
        env:
          TZ: Asia/Tokyo
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_PROJECTS: ${{ secrets.ASANA_PROJECTS || '[{"gid":"1214016121056319","name":"Provia"},{"gid":"1214016121056325","name":"Blueship"},{"gid":"1214016121056331","name":"BlueVoyant"},{"gid":"1214016121056337","name":"DataArt"},{"gid":"1214023936100425","name":"ZIPAIR Tokyo"}]' }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          MEMBER_MAPPINGS: ${{ secrets.MEMBER_MAPPINGS }}
        run: npm start
